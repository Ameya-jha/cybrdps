<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drama Owns</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="nav">
    <div class="logo">DRAMA OWNS</div>
    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main class="hero">
    <div class="portrait-placeholder">
      <svg viewBox="0 0 400 500" preserveAspectRatio="xMidYMax slice">
        <rect width="400" height="500" fill="none"/>
        <circle cx="200" cy="150" r="85" fill="#2a2a2a"/>
        <path d="M 90 500 C 90 330 130 250 200 250 C 270 250 310 330 310 500 Z" fill="#2a2a2a"/>
      </svg>
    </div>

    <h1 class="wordmark">
      <span>DRAMA</span><span>OWNS</span>
    </h1>

    <p class="tagline tagline-left">Join For More Asian Dramas</p>
    <p class="tagline tagline-right">Presented By: DramaOwns</p>

    <div class="socials">
      <a href="#" aria-label="Instagram" class="social-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1"/>
        </svg>
      </a>
      <a href="#" aria-label="Facebook" class="social-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
        </svg>
      </a>
    </div>
  </main>

  <!-- Audio placeholder: replace src in the <audio> tag below with your own file -->
  <audio id="bg-audio" src="audio/placeholder.mp3" preload="none" loop></audio>

  <button id="audio-toggle" class="audio-toggle" aria-label="Play audio" aria-pressed="false">
    <svg class="icon-play" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    <svg class="icon-pause" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
  </button>

  <script src="script.js"></script>
</body>
</html>
